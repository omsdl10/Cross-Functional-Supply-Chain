<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Supply Chain Concierge</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f6f7f9;
        color: #16202a;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }

      main {
        width: min(920px, calc(100vw - 32px));
        display: grid;
        gap: 24px;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        line-height: 1.1;
        font-weight: 720;
      }

      p {
        margin: 0;
        max-width: 720px;
        color: #4a5563;
        font-size: 18px;
        line-height: 1.6;
      }

      .status-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 12px;
      }

      .status-card {
        border: 1px solid #d9dee7;
        border-radius: 8px;
        background: #ffffff;
        padding: 18px;
      }

      .label {
        color: #637083;
        font-size: 13px;
        text-transform: uppercase;
      }

      .value {
        margin-top: 8px;
        font-size: 20px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <section>
        <h1>Cross-Functional Supply Chain Concierge</h1>
        <p>
          Stage 1 foundation for an operational AI system that monitors supplier risk, checks inventory impact, and prepares mitigation workflows for human approval.
        </p>
      </section>
      <section class="status-grid" aria-label="Project foundation status">
        <article class="status-card">
          <div class="label">Stage</div>
          <div class="value">Foundation</div>
        </article>
        <article class="status-card">
          <div class="label">Backend</div>
          <div class="value">Health API</div>
        </article>
        <article class="status-card">
          <div class="label">Next</div>
          <div class="value">Mock Data</div>
        </article>
      </section>
    </main>
  </body>
</html>
